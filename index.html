<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>ProStress</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #000000;
    --red: #ff2222;
    --red-dim: #6b0000;
    --amber: #ff8800;
    --green: #00ff88;
    --white: #e8e8e8;
    --dim: #333333;
    --mono: 'Share Tech Mono', monospace;
    --sans: 'Rajdhani', sans-serif;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--white);
    font-family: var(--mono);
    overflow: hidden;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ── SCAN LINE OVERLAY ── */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,.18) 2px,
      rgba(0,0,0,.18) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* ── SCREENS ── */
  .screen {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    opacity: 0;
    transition: opacity .6s ease;
    pointer-events: none;
  }
  .screen.active {
    opacity: 1;
    pointer-events: all;
  }

  /* ── VERIFY SCREEN ── */
  #scr-verify {
    gap: 18px;
  }
  .verify-icon {
    width: 48px; height: 48px;
    border: 1.5px solid var(--dim);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    position: relative;
    animation: spin-ring 3s linear infinite;
  }
  .verify-icon::before {
    content: '';
    position: absolute; inset: -4px;
    border: 1.5px solid transparent;
    border-top-color: var(--amber);
    border-radius: 50%;
    animation: spin-ring 1s linear infinite;
  }
  .verify-icon svg { opacity: .4; }
  @keyframes spin-ring { to { transform: rotate(360deg); } }

  .verify-label {
    font-size: 11px;
    letter-spacing: 3px;
    color: #444;
    text-transform: uppercase;
    font-family: var(--sans);
    font-weight: 300;
  }
  .verify-text {
    font-size: 13px;
    color: #555;
    letter-spacing: .5px;
    text-align: center;
    line-height: 1.8;
    padding: 0 40px;
  }
  .verify-dots span {
    display: inline-block;
    width: 4px; height: 4px;
    background: var(--dim);
    border-radius: 50%;
    margin: 0 3px;
    animation: blink-dot .9s ease-in-out infinite;
  }
  .verify-dots span:nth-child(2) { animation-delay: .2s; }
  .verify-dots span:nth-child(3) { animation-delay: .4s; }
  @keyframes blink-dot {
    0%,80%,100% { opacity: .2; }
    40% { opacity: 1; background: var(--amber); }
  }

  /* ── LOCK SCREEN ── */
  #scr-lock {
    gap: 0;
    background: #000;
  }

  /* Top status bar */
  .lock-topbar {
    position: absolute; top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--red-dim);
    overflow: hidden;
  }
  .lock-topbar::after {
    content: '';
    position: absolute; top: 0; left: -60%;
    width: 60%; height: 100%;
    background: linear-gradient(90deg, transparent, var(--red), transparent);
    animation: scan-bar 2s ease-in-out infinite;
  }
  @keyframes scan-bar { to { left: 100%; } }

  .lock-badge {
    font-size: 9px;
    letter-spacing: 4px;
    color: var(--red-dim);
    font-family: var(--sans);
    font-weight: 600;
    text-transform: uppercase;
    margin-bottom: 32px;
    border: 1px solid var(--red-dim);
    padding: 4px 12px;
    animation: pulse-border 2s ease-in-out infinite;
  }
  @keyframes pulse-border {
    0%,100% { border-color: var(--red-dim); color: var(--red-dim); }
    50% { border-color: var(--red); color: var(--red); }
  }

  .lock-icon-wrap {
    position: relative;
    width: 80px; height: 80px;
    margin-bottom: 28px;
  }
  .lock-ring {
    position: absolute; inset: 0;
    border: 1px solid var(--red-dim);
    border-radius: 50%;
  }
  .lock-ring:nth-child(2) {
    inset: 10px;
    border-style: dashed;
    animation: counter-spin 8s linear infinite;
  }
  @keyframes counter-spin { to { transform: rotate(-360deg); } }
  .lock-icon-inner {
    position: absolute; inset: 20px;
    background: var(--red-dim);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }

  .lock-reason {
    font-size: 10px;
    letter-spacing: 2px;
    color: #444;
    font-family: var(--sans);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .lock-countdown {
    font-size: clamp(42px, 12vw, 72px);
    font-family: var(--mono);
    color: var(--red);
    letter-spacing: -2px;
    line-height: 1;
    text-shadow: 0 0 30px rgba(255,34,34,.3);
    margin-bottom: 8px;
    position: relative;
  }
  .lock-countdown::before {
    content: attr(data-val);
    position: absolute; inset: 0;
    color: var(--red-dim);
    filter: blur(8px);
    z-index: -1;
  }

  .lock-sub {
    font-size: 11px;
    color: #333;
    letter-spacing: 2px;
    margin-bottom: 40px;
    font-family: var(--sans);
  }

  .lock-stat-row {
    display: flex; gap: 32px;
    border-top: 1px solid #111;
    padding-top: 24px;
  }
  .lock-stat {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
  }
  .lock-stat-val {
    font-size: 22px;
    color: var(--red-dim);
  }
  .lock-stat-label {
    font-size: 9px;
    color: #333;
    letter-spacing: 2px;
    font-family: var(--sans);
    text-transform: uppercase;
  }

  /* corner decorations */
  .corner {
    position: absolute;
    width: 20px; height: 20px;
    border-color: var(--red-dim);
    border-style: solid;
    opacity: .5;
  }
  .corner.tl { top: 16px; left: 16px; border-width: 1px 0 0 1px; }
  .corner.tr { top: 16px; right: 16px; border-width: 1px 1px 0 0; }
  .corner.bl { bottom: 16px; left: 16px; border-width: 0 0 1px 1px; }
  .corner.br { bottom: 16px; right: 16px; border-width: 0 1px 1px 0; }

  /* glitch flicker */
  @keyframes glitch {
    0%,94%,100% { transform: none; clip-path: none; opacity: 1; }
    95% { transform: translate(-2px, 0); clip-path: inset(30% 0 50% 0); opacity: .8; }
    97% { transform: translate(2px, 0); clip-path: inset(60% 0 10% 0); opacity: .8; }
  }
  .lock-countdown { animation: glitch 4s steps(1) infinite; }

  /* ── WAKELOCK STATUS ── */
  .wl-dot {
    position: fixed; bottom: 14px; right: 16px;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #1a1a1a;
    z-index: 10000;
    transition: background .4s;
  }
  .wl-dot.active { background: var(--green); box-shadow: 0 0 6px var(--green); }
</style>
</head>
<body>

<!-- VERIFY SCREEN -->
<div class="screen active" id="scr-verify">
  <div class="verify-icon">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="1.5">
      <circle cx="12" cy="12" r="10"/>
      <path d="M12 6v6l4 2"/>
    </svg>
  </div>
  <div class="verify-label">ProStress</div>
  <div class="verify-text">
    đang xác minh thời gian<br>mở trình duyệt của bạn
  </div>
  <div class="verify-dots">
    <span></span><span></span><span></span>
  </div>
</div>

<!-- LOCK SCREEN -->
<div class="screen" id="scr-lock">
  <div class="lock-topbar"></div>
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <div class="lock-badge" id="lock-badge">TRUY CẬP BỊ KHOÁ</div>

  <div class="lock-icon-wrap">
    <div class="lock-ring"></div>
    <div class="lock-ring"></div>
    <div class="lock-icon-inner">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ff2222" stroke-width="2">
        <rect x="3" y="11" width="18" height="11" rx="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>
  </div>

  <div class="lock-reason" id="lock-reason">GIỜ NGỦ • 22:00 – 06:00</div>

  <div class="lock-countdown" id="lock-countdown" data-val="00:00:00">00:00:00</div>
  <div class="lock-sub" id="lock-sub">còn lại để mở khoá</div>

  <div class="lock-stat-row">
    <div class="lock-stat">
      <div class="lock-stat-val" id="stat-opens">0</div>
      <div class="lock-stat-label">lần mở hôm nay</div>
    </div>
    <div class="lock-stat">
      <div class="lock-stat-val" id="stat-limit">15</div>
      <div class="lock-stat-label">giới hạn / ngày</div>
    </div>
    <div class="lock-stat">
      <div class="lock-stat-val" id="stat-time">00:00</div>
      <div class="lock-stat-label">thời gian hiện tại</div>
    </div>
  </div>
</div>

<!-- WakeLock indicator -->
<div class="wl-dot" id="wl-dot" title="WakeLock"></div>

<script>
/* ══════════════════════════════════════════
   PROSTRESS — Core Logic
   ══════════════════════════════════════════ */

const DAILY_LIMIT = 15;          // max opens per day
const SLEEP_START = 22;          // 22:00
const SLEEP_END   = 6;           // 06:00
const VERIFY_DELAY = 1800;       // ms of "verification" animation

/* ── Storage ── */
function getToday() {
  return new Date().toISOString().slice(0, 10);
}
function loadData() {
  try {
    const raw = localStorage.getItem('ps_data');
    if (raw) return JSON.parse(raw);
  } catch(_) {}
  return { date: getToday(), opens: 0 };
}
function saveData(d) {
  localStorage.setItem('ps_data', JSON.stringify(d));
}

function incrementOpens() {
  let d = loadData();
  if (d.date !== getToday()) {
    d = { date: getToday(), opens: 0 };
  }
  d.opens += 1;
  saveData(d);
  return d.opens;
}

/* ── Time Helpers ── */
function isSleepTime() {
  const h = new Date().getHours();
  return h >= SLEEP_START || h < SLEEP_END;
}

function secondsUntilSleepEnd() {
  const now = new Date();
  const wake = new Date(now);
  if (now.getHours() < SLEEP_END) {
    wake.setHours(SLEEP_END, 0, 0, 0);
  } else {
    wake.setDate(wake.getDate() + 1);
    wake.setHours(SLEEP_END, 0, 0, 0);
  }
  return Math.floor((wake - now) / 1000);
}

function secondsUntilMidnight() {
  const now = new Date();
  const midnight = new Date(now);
  midnight.setDate(midnight.getDate() + 1);
  midnight.setHours(0, 0, 0, 0);
  return Math.floor((midnight - now) / 1000);
}

function fmtSeconds(s) {
  s = Math.max(0, s);
  const h = String(Math.floor(s / 3600)).padStart(2, '0');
  const m = String(Math.floor((s % 3600) / 60)).padStart(2, '0');
  const sec = String(s % 60).padStart(2, '0');
  return `${h}:${m}:${sec}`;
}

function fmtTime(d) {
  return d.toTimeString().slice(0, 5);
}

/* ── WakeLock ── */
let wakeLock = null;
async function acquireWakeLock() {
  if ('wakeLock' in navigator) {
    try {
      wakeLock = await navigator.wakeLock.request('screen');
      document.getElementById('wl-dot').classList.add('active');
      wakeLock.addEventListener('release', () => {
        document.getElementById('wl-dot').classList.remove('active');
        setTimeout(acquireWakeLock, 1000);
      });
    } catch (_) {}
  }
}
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') acquireWakeLock();
});

/* ── Fullscreen ── */
function requestFS() {
  const el = document.documentElement;
  const req = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen;
  if (req) req.call(el).catch(() => {});
}

// Re-request fullscreen whenever exited
document.addEventListener('fullscreenchange', () => {
  if (!document.fullscreenElement) {
    setTimeout(requestFS, 200);
  }
});
document.addEventListener('webkitfullscreenchange', () => {
  if (!document.webkitFullscreenElement) {
    setTimeout(requestFS, 200);
  }
});

// On any touch → ensure fullscreen
document.addEventListener('touchstart', () => {
  if (!document.fullscreenElement && !document.webkitFullscreenElement) {
    requestFS();
  }
}, { passive: true });

// On click too (desktop fallback)
document.addEventListener('click', () => {
  if (!document.fullscreenElement && !document.webkitFullscreenElement) {
    requestFS();
  }
}, { once: false });

// Block F11 key attempting manual fullscreen toggle
document.addEventListener('keydown', (e) => {
  if (e.key === 'F11') {
    e.preventDefault();
    requestFS();
  }
});

/* ── Screens ── */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ── Lock countdown ── */
let countdownInterval = null;
let countdownTarget = 0; // seconds remaining at start

function startCountdown(type) {
  const el   = document.getElementById('lock-countdown');
  const badge = document.getElementById('lock-badge');
  const reason = document.getElementById('lock-reason');

  if (type === 'sleep') {
    badge.textContent  = 'GIỜ NGỦ – KHOÁ';
    reason.textContent = 'GIỜ NGỦ • 22:00 – 06:00';
    countdownTarget = secondsUntilSleepEnd();
  } else {
    badge.textContent  = 'VƯỢT GIỚI HẠN – KHOÁ';
    reason.textContent = `ĐÃ MỞ QUÁ ${DAILY_LIMIT} LẦN HÔM NAY`;
    countdownTarget = secondsUntilMidnight();
  }

  function tick() {
    if (type === 'sleep') {
      countdownTarget = secondsUntilSleepEnd();
      // If sleep ended, reload
      if (!isSleepTime()) { location.reload(); return; }
    } else {
      countdownTarget = secondsUntilMidnight();
      // If midnight passed (new day), reload
      if (getToday() !== loadData().date) { location.reload(); return; }
    }

    const txt = fmtSeconds(countdownTarget);
    el.textContent = txt;
    el.setAttribute('data-val', txt);

    // Update stats
    document.getElementById('stat-time').textContent = fmtTime(new Date());
  }

  tick();
  if (countdownInterval) clearInterval(countdownInterval);
  countdownInterval = setInterval(tick, 1000);
}

function updateStats(opens) {
  document.getElementById('stat-opens').textContent = opens;
  document.getElementById('stat-limit').textContent = DAILY_LIMIT;
  document.getElementById('stat-time').textContent = fmtTime(new Date());
}

/* ── MAIN ── */
async function main() {
  // Immediately try fullscreen (will only work after user gesture on some browsers)
  requestFS();

  // WakeLock
  acquireWakeLock();

  // Count this open
  const opens = incrementOpens();

  // Show verify screen for VERIFY_DELAY ms
  showScreen('scr-verify');

  await new Promise(r => setTimeout(r, VERIFY_DELAY));

  // Determine lock state
  const sleep = isSleepTime();
  const overlimit = opens > DAILY_LIMIT;

  updateStats(opens);

  if (sleep) {
    showScreen('scr-lock');
    startCountdown('sleep');
  } else if (overlimit) {
    showScreen('scr-lock');
    startCountdown('overlimit');
  } else {
    // No lock → redirect to Google
    window.location.replace('https://www.google.com');
  }
}

// Start after a tiny paint delay
requestAnimationFrame(() => requestAnimationFrame(main));
</script>
</body>
</html>
